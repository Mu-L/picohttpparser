name: Release

on:
  push:
    branches:
    - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run release automation
      run: |
        misc/release.rb \
          --source-branch master \
          --release-branch release \
          --tag-prefix v1. \
          --remote origin \
          --author-name "Kazuho Oku" \
          --author-email "kazuhooku+github-actions@gmail.com" \
          --push
